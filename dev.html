<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>[DEV] MIMI Time</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500&display=swap" rel="stylesheet">
<script src="mimi-data.js"></script>
<style>
body {
    margin: 0;
    background-color: #D6EEF9;
    font-family: 'Zen Maru Gothic', sans-serif;
    transition: background-color 0.5s;
    text-align: center;
    color: #2f2f2f;
}
#devBar {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: rgba(20, 20, 20, 0.92);
    color: #e6e8ff;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 9999;
    font-size: 13px;
    flex-wrap: wrap;
    backdrop-filter: blur(6px);
}
#devBar a {
    color: #aac0ff;
    text-decoration: none;
    padding: 4px 10px;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 999px;
    font-size: 12px;
}
#devBar select {
    background: #1e1e3f;
    color: #e6e8ff;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 12px;
}
#devBar span {
    opacity: 0.5;
    font-size: 12px;
}
.container {
    max-width: 560px;
    margin: 0 auto;
    padding: 110px 16px 96px;
    box-sizing: border-box;
}
h1 { margin: 0 0 8px; color: #2f2f2f; }
p { margin: 6px 0; color: #555555; }
.time { color: #777777; }
.video-wrap { margin-top: 24px; }
.video-wrap iframe {
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 12px;
    border: none;
}
.song-title {
    display: block;
    max-width: 90%;
    margin: 12px auto;
    font-size: 16px;
    line-height: 1.6;
    text-align: center;
    color: #a9a9a9;
    text-decoration: none;
}
.main-btn {
    appearance: none;
    -webkit-appearance: none;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.85);
    padding: 5px 16px;
    font-size: 13px;
    cursor: pointer;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    transition: all 0.3s ease;
    margin-top: 6px;
    margin-bottom: 4px;
}
.main-btn:hover {
    background: rgba(255,255,255,0.25);
    transform: translateY(-2px);
}
.footer-text { margin-top: 12px; color: #777777; }
</style>
</head>
<body>
<div id="devBar">
    <a href="main.html">← メインに戻る</a>
    <span>DEV MODE</span>
    <label>時間帯：<select id="zoneSelect" onchange="location.href='dev.html?zone='+this.value">
        <option value="morning">morning（朝）</option>
        <option value="day">day（昼）</option>
        <option value="evening">evening（夕）</option>
        <option value="night">night（夜）</option>
        <option value="late night">late night（深夜）</option>
    </select></label>
    <span id="videoInfo"></span>
</div>
<div class="container">
    <h1 id="title"></h1>
    <p id="meta"></p>
    <div class="video-wrap" id="videoWrap"></div>
    <a id="songTitle" class="song-title" target="_blank"></a>
    <button class="main-btn" onclick="location.reload()">別の曲を試す</button>
    <div id="footerText" class="footer-text"></div>
</div>
<script>
function getJstHour() {
    const now = new Date();
    const utc = now.getTime() + now.getTimezoneOffset() * 60000;
    const jst = new Date(utc + 9 * 3600000);
    return jst.getHours();
}
function getTimeZone(hour) {
    if (5 <= hour && hour < 8) return 'morning';
    if (8 <= hour && hour < 17) return 'day';
    if (17 <= hour && hour < 19) return 'evening';
    if (19 <= hour && hour < 23) return 'night';
    return 'late night';
}
function applyTheme(zone) {
    document.body.style.backgroundColor = BG_COLOR[zone];
    document.body.style.color = TEXT_COLOR_MAIN[zone];
    document.getElementById('title').textContent = TIME_LABEL[zone];
    document.getElementById('title').style.color = TEXT_COLOR_MAIN[zone];
    document.getElementById('meta').textContent = '時間帯：' + zone + ' / ' + new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit', hour12:false});
    document.getElementById('meta').style.color = TEXT_COLOR_SUB[zone];
    document.getElementById('footerText').textContent = FOOTER_TEXT[zone];
    document.getElementById('footerText').style.color = TEXT_COLOR_FAINT[zone];
    document.getElementById('songTitle').style.color = TEXT_COLOR_FAINT[zone];
}
const params = new URLSearchParams(window.location.search);
const zone = params.get('zone') && TIME_LABEL[params.get('zone')] ? params.get('zone') : getTimeZone(getJstHour());
applyTheme(zone);
document.getElementById('zoneSelect').value = zone;
const videoId = DEV_ALL_VIDEOS[Math.floor(Math.random() * DEV_ALL_VIDEOS.length)];
document.getElementById('videoWrap').innerHTML = '<iframe src="https://www.youtube.com/embed/' + videoId + '" allowfullscreen></iframe>';
document.getElementById('songTitle').href = 'https://www.youtube.com/watch?v=' + videoId;
document.getElementById('songTitle').textContent = DEV_VIDEO_TITLES[videoId] || '';
document.getElementById('videoInfo').textContent = '動画ID: ' + videoId;
</script>
</body>
</html>
